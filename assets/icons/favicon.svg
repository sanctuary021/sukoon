<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    circle { fill: none; stroke: var(--accent, #537060); stroke-width: 2.5; }
    circle.outer { opacity: 0.35; }
    circle.mid { opacity: 0.65; }
    circle.inner { fill: var(--accent, #537060); }
    @media (prefers-color-scheme: dark) {
      :root { --accent: #8fa89b; }
    }
  </style>
  <circle cx="16" cy="16" r="13.5" class="outer" />
  <circle cx="16" cy="16" r="8.5" class="mid" />
  <circle cx="16" cy="16" r="3.5" class="inner" />
</svg>
